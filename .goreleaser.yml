version: 2

project_name: uniai

builds:
  - id: uniai
    main: ./cmd/multica
    dir: server
    binary: uniai
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
  # Same code, pre-rename binary name. Packed into the multica-named
  # compatibility archives below: already-released CLIs extract a binary
  # named `multica` when self-updating. Remove together with those archives
  # once pre-rename versions are no longer in use.
  - id: multica-compat
    main: ./cmd/multica
    dir: server
    binary: multica
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  # Pre-rename compatibility archives so already-released CLIs can keep
  # self-updating. The oldest CLIs look for `multica_{os}_{arch}`, newer
  # pre-rename CLIs look for `multica-cli-<version>-...`; both extract a
  # binary named `multica`. Remove once those versions are no longer in use.
  - id: legacy
    ids:
      - multica-compat
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "multica_{{ .Os }}_{{ .Arch }}"
  - id: legacy-versioned
    ids:
      - multica-compat
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "multica-cli-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
  # Current archive name used by CLI self-update / install scripts /
  # desktop bootstrap.
  - id: versioned
    ids:
      - uniai
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-cli-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Homebrew tap publishing removed: this repo distributes the CLI via
# GitHub Release binaries only (scripts/install.sh), not a brew tap.

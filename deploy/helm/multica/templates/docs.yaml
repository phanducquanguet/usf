{{- $docsImageTag := default .Chart.AppVersion .Values.images.docs.tag -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "multica.docs.fullname" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: docs
spec:
  replicas: {{ .Values.docs.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: multica
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: docs
  template:
    metadata:
      labels:
        {{- include "multica.labels" . | nindent 8 }}
        app.kubernetes.io/component: docs
    spec:
      containers:
        - name: docs
          image: "{{ .Values.images.docs.repository }}:{{ $docsImageTag }}"
          imagePullPolicy: {{ .Values.images.docs.pullPolicy }}
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "4000"
          resources:
            {{- toYaml .Values.docs.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "multica.docs.fullname" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: docs
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: multica
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: docs
  ports:
    - port: 4000
      targetPort: 4000
      name: http
{{- if .Values.frontend.compatibility.docsAlias }}
---
# DNS alias: the multica-web image bakes DOCS_URL=http://docs:4000 at build
# time, and the Next.js standalone build does not re-evaluate the rewrite
# destinations from runtime env. This ExternalName makes the bare host "docs"
# resolve to the docs Service inside the cluster, so the frontend's /docs
# proxy works out of the box.
#
# The name is intentionally unprefixed ("docs", not "{{ .Release.Name }}-docs")
# because the baked-in host has no release prefix. Same caveat as the
# "backend" alias: only ONE release of this chart can run per namespace (see
# frontend.compatibility.docsAlias in values.yaml).
apiVersion: v1
kind: Service
metadata:
  name: docs
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: docs-alias
spec:
  type: ExternalName
  externalName: {{ printf "%s.%s.svc.cluster.local" (include "multica.docs.fullname" .) .Release.Namespace }}
{{- end }}
